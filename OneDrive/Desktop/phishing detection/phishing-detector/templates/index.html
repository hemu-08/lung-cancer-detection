<!DOCTYPE html>
<html>

<head>
    <title>Lung Cancer Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .header {
            background: linear-gradient(135deg, #0f3460, #e94560);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.85;
        }

        .form-body {
            padding: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 14px;
            border: 2px solid #e8ecff;
        }

        .form-group:hover {
            border-color: #0f3460;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #0f3460;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group select {
            width: 100%;
            padding: 8px;
            border: none;
            background: white;
            border-radius: 8px;
            font-size: 13px;
            color: #333;
            outline: none;
            border: 1px solid #dde;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0f3460, #e94560);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        #result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }

        .high {
            background: linear-gradient(135deg, #ff6b6b, #ee0979);
            color: white;
            display: block;
        }

        .low {
            background: linear-gradient(135deg, #56ab2f, #a8e063);
            color: white;
            display: block;
        }

        .checking {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: white;
            display: block;
        }

        .result-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .result-text {
            font-size: 18px;
            margin-bottom: 6px;
        }

        .result-prob {
            font-size: 14px;
            opacity: 0.9;
        }

        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Lung Cancer Early Detection</h1>
            <p>AI-powered risk assessment for non-smokers using clinical symptoms</p>
        </div>

        <div class="form-body">
            <div class="form-grid">
                <div class="form-group">
                    <label>Smoking Level</label>
                    <select id="SMOKING">
                        <option value="0">Non Smoker</option>
                        <option value="1">Light</option>
                        <option value="2">Moderate</option>
                        <option value="3">Heavy</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Yellow Fingers</label>
                    <select id="YELLOW_FINGERS">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Anxiety</label>
                    <select id="ANXIETY">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Peer Pressure</label>
                    <select id="PEER_PRESSURE">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Chronic Disease</label>
                    <select id="CHRONIC_DISEASE">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fatigue</label>
                    <select id="FATIGUE">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Allergy</label>
                    <select id="ALLERGY">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Wheezing</label>
                    <select id="WHEEZING">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
            </div>

            <button class="btn" onclick="checkRisk()">CHECK RISK NOW</button>

            <div id="result">
                <div class="result-icon" id="result-icon"></div>
                <div class="result-text" id="result-text"></div>
                <div class="result-prob" id="result-prob"></div>
            </div>
        </div>

        <div class="footer">
            Built with Machine Learning | For educational purposes only
        </div>
    </div>

    <script>
        function checkRisk() {
            var result = document.getElementById("result");
            result.className = "checking";
            document.getElementById("result-icon").textContent = "⏳";
            document.getElementById("result-text").textContent = "Analyzing...";
            document.getElementById("result-prob").textContent = "";

            fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    SMOKING: document.getElementById("SMOKING").value,
                    YELLOW_FINGERS: document.getElementById("YELLOW_FINGERS").value,
                    ANXIETY: document.getElementById("ANXIETY").value,
                    PEER_PRESSURE: document.getElementById("PEER_PRESSURE").value,
                    CHRONIC_DISEASE: document.getElementById("CHRONIC_DISEASE").value,
                    FATIGUE: document.getElementById("FATIGUE").value,
                    ALLERGY: document.getElementById("ALLERGY").value,
                    WHEEZING: document.getElementById("WHEEZING").value
                })
            })
                .then(r => r.json())
                .then(d => {
                    if (d.result.includes("HIGH")) {
                        result.className = "high";
                        result.style.display = "block";
                        document.getElementById("result-icon").textContent = "⚠️";
                    } else {
                        result.className = "low";
                        result.style.display = "block";
                        document.getElementById("result-icon").textContent = "✅";
                    }
                    document.getElementById("result-text").textContent = d.result;
                    document.getElementById("result-prob").textContent = "Risk Probability: " + d.probability + "%";
                })
                .catch(e => {
                    result.className = "checking";
                    document.getElementById("result-text").textContent = "Error: " + e;
                });
        }
    </script>
</body>

</html>
